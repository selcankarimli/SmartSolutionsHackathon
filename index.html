<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard - Lokal AI Analiz</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Progress Ring Animasiyası */
        .progress-ring-circle {
            transition: stroke-dashoffset 0.6s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* Xəta titrəmə animasiyası */
        .shake {
            animation: shake-animation 0.5s ease-in-out;
        }

        @keyframes shake-animation {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Hamar keçid */
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen flex flex-col items-center py-12 px-4">

    <!-- Üst Bildiriş (Mikrofon İcazəsi) -->
    <div id="alertBox" class="hidden w-full max-w-2xl mb-6 p-4 rounded-2xl bg-[#FEF2F2] border border-[#FEE2E2] flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center text-red-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            </div>
            <div>
                <h4 class="font-bold text-red-900 text-sm italic">İcazə lazımdır</h4>
                <p class="text-red-700 text-xs mt-0.5">Analiz üçün mikrofondan istifadəyə icazə verməlisiniz.</p>
            </div>
        </div>
        <button onclick="hideAlert()" class="text-red-400 hover:text-red-600 p-2">&times;</button>
    </div>

    <!-- Əsas Konteyner -->
    <div class="w-full max-w-3xl">
        
        <!-- Giriş Bölməsi -->
        <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100 mb-8">
            <div class="relative group mb-6">
                <textarea id="textInput" 
                    class="w-full h-44 p-6 bg-[#F8FAFC] border border-slate-200 rounded-3xl focus:ring-4 focus:ring-blue-50 focus:border-blue-500 transition-all outline-none text-slate-700 text-lg placeholder:text-slate-400 resize-none"
                    placeholder="Mesajı bura yapışdırın və ya mikrofonla danışın..."></textarea>
                
                <button onclick="showAlert()" class="absolute bottom-4 right-4 p-3 bg-white border border-slate-200 text-slate-400 hover:text-blue-600 hover:border-blue-200 rounded-2xl transition-all shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                </button>
            </div>

            <button id="checkBtn" onclick="processAnalysis()" class="w-full py-5 bg-[#4F46E5] hover:bg-[#4338CA] text-white font-bold rounded-3xl transition-all shadow-lg shadow-indigo-100 active:scale-[0.98] flex items-center justify-center gap-3 text-lg">
                <span id="btnText">Yoxla</span>
                <div id="spinner" class="hidden w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            </button>

            <div class="mt-4 flex flex-col items-center gap-1">
                <p class="text-[9px] text-slate-400 uppercase font-bold tracking-widest">Bütün analizlər sizin lokal cihazınızda həyata keçirilir</p>
                <div class="w-16 h-1 bg-slate-100 rounded-full"></div>
            </div>
        </div>

        <!-- Nəticə Bölməsi (Gizli başlayır) -->
        <div id="resultArea" class="hidden space-y-6 fade-in">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Risk Statusu -->
                <div id="riskCard" class="p-8 rounded-[2rem] flex flex-col items-center justify-center text-center transition-colors">
                    <div id="riskIcon" class="w-16 h-16 rounded-full flex items-center justify-center mb-4 text-3xl"></div>
                    <p class="text-[10px] font-extrabold uppercase tracking-[0.2em] opacity-60 mb-1">Risk Klassifikasiyası</p>
                    <h2 id="riskText" class="text-3xl font-black italic uppercase"></h2>
                </div>

                <!-- Əminlik Faizi -->
                <div class="bg-white p-8 rounded-[2rem] border border-slate-100 flex flex-col items-center justify-center shadow-sm">
                    <div class="relative w-24 h-24 mb-3">
                        <svg viewBox="0 0 100 100" class="w-full h-full">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="#F1F5F9" stroke-width="8"></circle>
                            <circle id="progressRing" cx="50" cy="50" r="45" fill="none" stroke="#10B981" stroke-width="8" stroke-dasharray="283" stroke-dashoffset="283" stroke-linecap="round" class="progress-ring-circle"></circle>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span id="percentText" class="text-2xl font-black text-slate-800 tracking-tighter">0%</span>
                        </div>
                    </div>
                    <p class="text-[10px] font-extrabold uppercase tracking-widest text-slate-400">Modelin Əminliyi</p>
                </div>
            </div>

            <!-- Detallı Analiz -->
            <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                <div class="flex items-center gap-2 mb-6">
                    <div class="w-2 h-6 bg-indigo-500 rounded-full"></div>
                    <h3 class="font-bold text-slate-800">Süni İntellekt Analizi</h3>
                </div>
                
                <p id="analysisReason" class="text-slate-600 leading-relaxed font-medium mb-6"></p>
                
                <div class="pt-6 border-t border-slate-50">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-3">Aşkar edilən indikatorlar:</p>
                    <div id="tagContainer" class="flex flex-wrap gap-2">
                        <!-- Taqlar bura gələcək -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const alertBox = document.getElementById('alertBox');
        const textInput = document.getElementById('textInput');
        const resultArea = document.getElementById('resultArea');
        const progressRing = document.getElementById('progressRing');
        const checkBtn = document.getElementById('checkBtn');

        function showAlert() {
            alertBox.classList.remove('hidden');
            alertBox.classList.add('shake');
            setTimeout(() => alertBox.classList.remove('shake'), 500);
        }

        function hideAlert() {
            alertBox.classList.add('hidden');
        }

        async function processAnalysis() {
            const text = textInput.value.trim();
            if(!text) return;

            // Loading state
            checkBtn.disabled = true;
            document.getElementById('btnText').classList.add('hidden');
            document.getElementById('spinner').classList.remove('hidden');
            resultArea.classList.add('hidden');

            // 1 saniyəlik süni gecikmə (reallıq üçün)
            await new Promise(r => setTimeout(r, 1200));

            const analysis = performAdvancedAnalysis(text);
            displayResults(analysis);

            checkBtn.disabled = false;
            document.getElementById('btnText').classList.remove('hidden');
            document.getElementById('spinner').classList.add('hidden');
        }

        // Təkmilləşdirilmiş Məntiq (Görüntüdəki xətanın həlli buradadır)
        function performAdvancedAnalysis(text) {
            const input = text.toLowerCase();
            
            // Fişinq açar sözləri və nümunələri
            const scamPatterns = [
                { keyword: 'kart', weight: 40 },
                { keyword: 'qazandın', weight: 40 },
                { keyword: 'mükafat', weight: 30 },
                { keyword: 'pulu', weight: 20 },
                { keyword: 'link', weight: 25 },
                { keyword: 'parol', weight: 50 },
                { keyword: 'bank', weight: 15 }
            ];

            let score = 0;
            let triggers = [];

            scamPatterns.forEach(p => {
                if(input.includes(p.keyword)) {
                    score += p.weight;
                    triggers.push(p.keyword.charAt(0).toUpperCase() + p.keyword.slice(1));
                }
            });

            // Görüntüdəki spesifik cümlə üçün yoxlanış
            if (input.includes("100000") || input.includes("göndər")) {
                score += 30;
                triggers.push("Təzyiq Metodu");
            }

            if (score >= 60) {
                return {
                    risk: "TƏHLÜKƏLİ",
                    confidence: Math.min(99, 80 + (score/5)),
                    summary: "Sistem bu mesajda maliyyə fırıldaqçılığı əlamətləri aşkar etdi. Mesajda vəd edilən mükafat və ya kart məlumatı tələbi tipik fişinq (phishing) metodudur. Heç bir keçidə daxil olmayın.",
                    tags: triggers.length > 0 ? triggers : ["Şübhəli Məzmun", "Sosial Mühəndislik"],
                    theme: 'red'
                };
            } else if (score >= 20) {
                return {
                    risk: "ŞÜBHƏLİ",
                    confidence: 65,
                    summary: "Mesajın məzmunu qeyri-müəyyəndir. Tanımadığınız şəxslərdən gələn bu növ mesajlara qarşı ehtiyatlı olun.",
                    tags: ["Həssas Analiz", "Naməlum Mənbə"],
                    theme: 'amber'
                };
            } else {
                return {
                    risk: "TƏHLÜKƏSİZ",
                    confidence: 88,
                    summary: "Analiz nəticəsində heç bir zərərli element və ya aldadıcı struktur aşkar edilmədi. Mesaj normal ünsiyyət xarakterlidir.",
                    tags: ["Təhlükəsiz Struktur", "Normal Dil"],
                    theme: 'emerald'
                };
            }
        }

        function displayResults(data) {
            resultArea.classList.remove('hidden');
            
            const riskCard = document.getElementById('riskCard');
            const riskIcon = document.getElementById('riskIcon');
            const riskText = document.getElementById('riskText');
            const percentText = document.getElementById('percentText');
            const reason = document.getElementById('analysisReason');
            const tags = document.getElementById('tagContainer');

            // UI rənglərini tənzimlə
            const themes = {
                red: { bg: 'bg-red-50', border: 'border-red-100', text: 'text-red-700', icon: 'bg-red-500', svg: '🚫' },
                amber: { bg: 'bg-amber-50', border: 'border-amber-100', text: 'text-amber-700', icon: 'bg-amber-500', svg: '🧐' },
                emerald: { bg: 'bg-emerald-50', border: 'border-emerald-100', text: 'text-emerald-700', icon: 'bg-emerald-500', svg: '🛡️' }
            };

            const t = themes[data.theme];
            riskCard.className = `p-8 rounded-[2rem] border ${t.border} ${t.bg} ${t.text} flex flex-col items-center justify-center text-center shadow-sm`;
            riskIcon.className = `w-16 h-16 rounded-full ${t.icon} flex items-center justify-center mb-4 text-white text-3xl shadow-lg`;
            riskIcon.textContent = t.svg;
            riskText.textContent = data.risk;
            
            // Faiz və Ring animasiyası
            percentText.textContent = `${Math.round(data.confidence)}%`;
            const offset = 283 - (data.confidence / 100) * 283;
            progressRing.style.strokeDashoffset = offset;
            progressRing.style.stroke = data.theme === 'red' ? '#EF4444' : (data.theme === 'amber' ? '#F59E0B' : '#10B981');

            reason.textContent = data.summary;

            // Taqları yenilə
            tags.innerHTML = '';
            data.tags.forEach(tag => {
                const s = document.createElement('span');
                s.className = "px-4 py-1.5 rounded-xl bg-slate-50 border border-slate-100 text-[11px] font-bold text-slate-500 uppercase tracking-tight";
                s.textContent = tag;
                tags.appendChild(s);
            });

            // Avtomatik aşağı sürüşdür
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
