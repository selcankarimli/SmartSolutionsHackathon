<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard AI - Scam Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .listening-glow {
            box-shadow: 0 0 20px rgba(79, 70, 229, 0.3);
            animation: pulse-border 1.5s infinite;
        }
        @keyframes pulse-border {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .progress-ring-circle {
            transition: stroke-dashoffset 0.8s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <header class="text-center mb-10">
            <div class="inline-flex items-center justify-center p-4 bg-indigo-600 rounded-3xl mb-6 shadow-xl">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m12 8 4 4"/><path d="m12 12-4-4"/></svg>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">PhishGuard AI</h1>
            <p class="text-slate-500 mt-2 font-medium">Süni İntellektlə təchiz edilmiş təhlükəsizlik analizi</p>
        </header>

        <!-- Bildiriş Paneli -->
        <div id="alertBox" class="hidden mb-6 p-4 rounded-2xl flex items-start gap-3 border animate-in fade-in slide-in-from-top-4 duration-300">
            <div id="alertIcon" class="mt-0.5"></div>
            <div class="flex-1">
                <h4 id="alertTitle" class="font-bold text-sm"></h4>
                <p id="alertMsg" class="text-xs mt-1 opacity-90"></p>
            </div>
            <button onclick="hideAlert()" class="opacity-50 hover:opacity-100 text-xl">&times;</button>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 p-6 md:p-10 mb-8 relative overflow-hidden">
            <div class="flex flex-col gap-6 relative z-10">
                <textarea id="userInput"
                    class="w-full h-48 p-6 bg-slate-50 border border-slate-200 rounded-3xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 transition-all outline-none text-slate-700 text-lg placeholder:text-slate-400 resize-none"
                    placeholder="Şübhəli mesajı bura əlavə edin..."></textarea>
                
                <div class="flex gap-4">
                    <button id="analyzeBtn"
                        class="flex-grow bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white font-bold py-5 rounded-2xl transition-all flex items-center justify-center gap-3 text-lg shadow-lg shadow-indigo-100">
                        <span id="btnLabel">Analiz Et</span>
                        <div id="loader" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                    </button>
                    
                    <button id="micBtn" 
                        class="w-20 bg-slate-100 hover:bg-slate-200 border border-slate-200 rounded-2xl flex items-center justify-center transition-all relative group">
                        <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-500 transition-colors"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
                        <div id="micPulse" class="hidden absolute inset-0 rounded-2xl bg-indigo-500/10 animate-ping"></div>
                    </button>
                </div>
                <p id="statusMsg" class="text-center text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Sistem Hazırdır</p>
            </div>
        </div>

        <!-- Nəticə Paneli -->
        <div id="results" class="hidden space-y-6 animate-in fade-in slide-in-from-bottom-6 duration-700">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div id="riskCard" class="p-8 rounded-[2rem] border flex flex-col items-center justify-center transition-all duration-500">
                    <div id="riskIcon" class="mb-4 p-4 rounded-full bg-white/50"></div>
                    <span class="text-[10px] font-bold uppercase tracking-widest opacity-60 mb-1">RİSK DƏRƏCƏSİ</span>
                    <h2 id="riskLevel" class="text-3xl font-black tracking-tight"></h2>
                </div>
                <div class="bg-white p-8 rounded-[2rem] border border-slate-200 flex flex-col items-center justify-center shadow-sm">
                    <div class="relative flex items-center justify-center mb-2">
                        <svg class="w-24 h-24">
                            <circle class="text-slate-100" stroke-width="8" stroke="currentColor" fill="transparent" r="40" cx="48" cy="48" />
                            <circle id="confRing" class="text-indigo-600 progress-ring-circle" stroke-width="8" stroke-dasharray="251.3" stroke-dashoffset="251.3" stroke-linecap="round" stroke="currentColor" fill="transparent" r="40" cx="48" cy="48" />
                        </svg>
                        <span id="confVal" class="absolute text-xl font-bold text-slate-800">0%</span>
                    </div>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Analiz Dəqiqliyi</span>
                </div>
            </div>
            <div class="bg-white rounded-[2rem] border border-slate-200 p-8 shadow-sm">
                <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-4">Ekspert Rəyi</h3>
                <p id="analysisText" class="text-slate-700 leading-relaxed text-lg font-medium"></p>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const userInput = document.getElementById('userInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const micBtn = document.getElementById('micBtn');
        const micIcon = document.getElementById('micIcon');
        const micPulse = document.getElementById('micPulse');
        const statusMsg = document.getElementById('statusMsg');
        const alertBox = document.getElementById('alertBox');
        
        let recognition = null;
        let isListening = false;

        function showAlert(type, title, msg) {
            alertBox.className = `mb-6 p-4 rounded-2xl flex items-start gap-3 border animate-in fade-in duration-300 ${type === 'error' ? 'bg-red-50 border-red-200 text-red-800' : 'bg-indigo-50 border-indigo-200 text-indigo-800'}`;
            document.getElementById('alertTitle').textContent = title;
            document.getElementById('alertMsg').textContent = msg;
            document.getElementById('alertIcon').innerHTML = type === 'error' ? 
                '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' : 
                '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>';
            alertBox.classList.remove('hidden');
        }

        function hideAlert() { alertBox.classList.add('hidden'); }

        // Speech Recognition
        const SpeechReg = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechReg) {
            recognition = new SpeechReg();
            recognition.lang = 'az-AZ';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (e) => {
                let text = '';
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    if (e.results[i].isFinal) text += e.results[i][0].transcript;
                }
                if (text) userInput.value += (userInput.value ? ' ' : '') + text;
            };

            recognition.onerror = (e) => {
                stopMic();
                if (e.error === 'not-allowed') {
                    showAlert('error', 'İcazə Lazımdır', 'Brauzer parametrlərindən mikrofona icazə verin.');
                }
            };
        }

        function startMic() {
            if (!recognition) return showAlert('error', 'Dəstəklənmir', 'Brauzeriniz səs tanımayı dəstəkləmir.');
            
            isListening = true;
            recognition.start();
            micBtn.classList.add('listening-glow', 'bg-indigo-50', 'border-indigo-300');
            micIcon.classList.replace('text-slate-500', 'text-indigo-600');
            micPulse.classList.remove('hidden');
            statusMsg.textContent = "Sizi dinləyirəm...";
            statusMsg.classList.replace('text-slate-400', 'text-indigo-600');
            hideAlert();
        }

        function stopMic() {
            isListening = false;
            if (recognition) recognition.stop();
            micBtn.classList.remove('listening-glow', 'bg-indigo-50', 'border-indigo-300');
            micIcon.classList.replace('text-indigo-600', 'text-slate-500');
            micPulse.classList.add('hidden');
            statusMsg.textContent = "Sistem Hazırdır";
            statusMsg.classList.replace('text-indigo-600', 'text-slate-400');
        }

        micBtn.addEventListener('click', () => {
            if (isListening) stopMic();
            else startMic();
        });

        // AI Logic
        analyzeBtn.addEventListener('click', async () => {
            const text = userInput.value.trim();
            if (!text) return;

            analyzeBtn.disabled = true;
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('btnLabel').classList.add('hidden');
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Aşağıdakı mesajı fırıldaqçılıq baxımından analiz et: "${text}". Cavabı JSON olaraq ver: {risk_level: "KRİTİK/ŞÜBHƏLİ/TƏHLÜKƏSİZ", confidence_score: 0-100, analysis_summary: "Qısa və peşəkar izah"}` }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                
                const json = await res.json();
                const result = JSON.parse(json.candidates[0].content.parts[0].text);
                showResults(result);
            } catch (err) {
                showAlert('error', 'Analiz Xətası', 'Sistem cavab vermir. Yenidən cəhd edin.');
            } finally {
                analyzeBtn.disabled = false;
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('btnLabel').classList.remove('hidden');
            }
        });

        function showResults(data) {
            const results = document.getElementById('results');
            results.classList.remove('hidden');
            
            document.getElementById('riskLevel').textContent = data.risk_level;
            document.getElementById('analysisText').textContent = data.analysis_summary;
            
            const ring = document.getElementById('confRing');
            const offset = 251.3 - (data.confidence_score / 100) * 251.3;
            ring.style.strokeDashoffset = offset;
            document.getElementById('confVal').textContent = data.confidence_score + "%";

            const card = document.getElementById('riskCard');
            const icon = document.getElementById('riskIcon');
            
            if (data.risk_level === 'KRİTİK') {
                card.className = "p-8 rounded-[2rem] border border-red-200 bg-red-50 text-red-700 flex flex-col items-center justify-center shadow-sm";
                icon.innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
            } else if (data.risk_level === 'ŞÜBHƏLİ') {
                card.className = "p-8 rounded-[2rem] border border-amber-200 bg-amber-50 text-amber-700 flex flex-col items-center justify-center shadow-sm";
                icon.innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
            } else {
                card.className = "p-8 rounded-[2rem] border border-emerald-200 bg-emerald-50 text-emerald-700 flex flex-col items-center justify-center shadow-sm";
                icon.innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>';
            }
            results.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
