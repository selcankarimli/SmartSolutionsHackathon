<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard AI - Scam & Phishing Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .progress-ring-circle {
            transition: stroke-dashoffset 0.8s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        .voice-pulse {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .active-voice {
            background-color: #fee2e2;
            border-color: #ef4444;
            color: #b91c1c;
        }
        .listening-glow {
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
            animation: glow 1.5s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 5px rgba(239, 68, 68, 0.2); }
            to { box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <header class="text-center mb-10">
            <div class="inline-flex items-center justify-center p-4 bg-blue-600 rounded-3xl mb-6 shadow-xl shadow-blue-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m12 8 4 4"/><path d="m12 12-4-4"/></svg>
            </div>
            <p class="text-slate-500 mt-3 text-lg">Səsli və yazılı şübhəli mesajları AI ilə analiz edin</p>
        </header>

        <!-- Input Section -->
        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 p-6 md:p-8 mb-8">
            <div class="flex flex-col gap-5">
                <label class="text-sm font-bold text-slate-700 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    Məzmunu daxil edin və ya mikrofonu aktivləşdirib danışın
                </label>
                <textarea id="userInput"
                    class="w-full h-40 p-5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none text-slate-700 text-lg leading-relaxed placeholder:text-slate-400"
                    placeholder="Məsələn: 'Bank hesabınız bloklanıb...'"></textarea>
                
                <div class="flex gap-3">
                    <button id="analyzeBtn"
                        class="flex-grow bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-bold py-5 rounded-2xl transition-all shadow-lg shadow-blue-100 flex items-center justify-center gap-3 text-lg">
                        <span id="btnContent" class="flex items-center gap-3">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                            Analiz et
                        </span>
                        <div id="loader" class="hidden w-6 h-6 border-3 border-white border-t-transparent rounded-full animate-spin"></div>
                    </button>
                    
                    <button id="toggleVoiceBtn" 
                        title="Danışaraq daxil et / Səsli cavab"
                        class="w-20 bg-slate-100 hover:bg-slate-200 border border-slate-200 rounded-2xl flex items-center justify-center transition-all group relative">
                        <svg id="voiceIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-500 group-hover:scale-110 transition-transform"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
                        <span id="recordingIndicator" class="hidden absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full border-2 border-white animate-pulse"></span>
                    </button>
                </div>
                <p id="voiceSettingsHint" class="text-[11px] text-slate-400 text-center font-medium">Səs rejimi deaktivdir. Mikrofon düyməsinə basaraq danışın.</p>
            </div>
        </div>

        <!-- Notification Center -->
        <div id="statusNotification" class="hidden fixed top-8 left-1/2 -translate-x-1/2 z-[100] bg-white border border-slate-200 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4 animate-fade-in max-w-md w-full">
            <div id="notifIcon" class="p-2 rounded-full"></div>
            <div class="flex-1">
                <p id="notifMessage" class="text-sm font-bold text-slate-800"></p>
                <p id="notifSubtext" class="text-xs text-slate-500 mt-1"></p>
            </div>
            <button onclick="hideNotification()" class="text-slate-400 hover:text-slate-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
        </div>

        <!-- Voice Status Overlay -->
        <div id="voiceStatus" class="hidden fixed bottom-8 right-8 bg-blue-600 text-white px-6 py-4 rounded-full shadow-2xl flex items-center gap-3 animate-fade-in voice-pulse z-50">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
            <span class="font-bold">AI cavab verir...</span>
        </div>

        <!-- Results Area -->
        <div id="resultsArea" class="hidden space-y-6 animate-fade-in">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div id="riskLevelCard" class="p-8 rounded-[2rem] border flex flex-col items-center text-center justify-center shadow-sm">
                    <span class="text-[10px] font-black uppercase tracking-[0.2em] mb-4 opacity-60">Risk Klassifikasiyası</span>
                    <div id="riskIcon" class="mb-3"></div>
                    <h2 id="riskLevelText" class="text-4xl font-black"></h2>
                </div>

                <div class="bg-white p-8 rounded-[2rem] border border-slate-200 flex flex-col items-center text-center justify-center shadow-sm">
                    <span class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-4">Etibarlılıq</span>
                    <div class="relative flex items-center justify-center">
                        <svg class="w-32 h-32">
                            <circle class="text-slate-100" stroke-width="10" stroke="currentColor" fill="transparent" r="50" cx="64" cy="64" />
                            <circle id="confidenceRing" class="text-blue-600 progress-ring-circle" stroke-width="10" stroke-dasharray="314.159" stroke-dashoffset="314.159" stroke-linecap="round" stroke="currentColor" fill="transparent" r="50" cx="64" cy="64" />
                        </svg>
                        <span id="confidenceText" class="absolute text-2xl font-black text-slate-800">0%</span>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] border border-slate-200 p-8 shadow-sm">
                <h3 class="text-sm font-black uppercase tracking-wider text-slate-400 mb-4">Analiz Xülasəsi</h3>
                <p id="summaryText" class="text-slate-700 leading-relaxed text-lg italic"></p>
                <button id="replayVoiceBtn" class="mt-4 inline-flex items-center gap-2 text-blue-600 font-bold text-sm hover:underline">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                    Səsi təkrarla
                </button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const analyzeBtn = document.getElementById('analyzeBtn');
        const toggleVoiceBtn = document.getElementById('toggleVoiceBtn');
        const voiceIcon = document.getElementById('voiceIcon');
        const voiceHint = document.getElementById('voiceSettingsHint');
        const recordingIndicator = document.getElementById('recordingIndicator');
        const userInput = document.getElementById('userInput');
        const loader = document.getElementById('loader');
        const btnContent = document.getElementById('btnContent');
        const resultsArea = document.getElementById('resultsArea');
        const voiceStatus = document.getElementById('voiceStatus');
        const replayVoiceBtn = document.getElementById('replayVoiceBtn');
        const statusNotification = document.getElementById('statusNotification');
        const notifIcon = document.getElementById('notifIcon');
        const notifMessage = document.getElementById('notifMessage');
        const notifSubtext = document.getElementById('notifSubtext');

        let lastResult = null;
        let isListening = false;
        let recognition = null;

        function showNotification(type, title, subtext) {
            statusNotification.classList.remove('hidden');
            notifMessage.textContent = title;
            notifSubtext.textContent = subtext;
            
            if (type === 'error') {
                notifIcon.className = 'p-2 rounded-full bg-red-100 text-red-600';
                notifIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
            } else {
                notifIcon.className = 'p-2 rounded-full bg-blue-100 text-blue-600';
                notifIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>';
            }

            setTimeout(hideNotification, 10000);
        }

        function hideNotification() {
            statusNotification.classList.add('hidden');
        }

        // Initialize Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'az-AZ';

            recognition.onresult = (event) => {
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    }
                }
                if (finalTranscript) {
                    userInput.value += (userInput.value ? ' ' : '') + finalTranscript;
                }
            };

            recognition.onerror = (event) => {
                console.error("STT Error:", event.error);
                if (event.error === 'not-allowed') {
                    showNotification('error', 'Mikrofon icazəsi yoxdur', 'Zəhmət olmasa brauzer parametrlərindən mikrofona icazə verin.');
                } else if (event.error === 'no-speech') {
                    showNotification('info', 'Səs eşidilmədi', 'Mikrofonun düzgün işlədiyindən əmin olun.');
                }
                stopListening();
            };
        }

        async function startListening() {
            if (!recognition) {
                showNotification('error', 'Dəstəklənmir', 'Sizin brauzeriniz səsdən mətnə funksiyasını dəstəkləmir.');
                return;
            }

            try {
                // Request explicit permission first to handle "not-allowed" better
                await navigator.mediaDevices.getUserMedia({ audio: true });
                
                isListening = true;
                recognition.start();
                toggleVoiceBtn.classList.add('active-voice', 'listening-glow');
                voiceIcon.classList.replace('text-slate-500', 'text-red-600');
                recordingIndicator.classList.remove('hidden');
                voiceHint.textContent = "Sizi dinləyirəm... Danışığınız bitdikdə yenidən basın.";
                voiceHint.classList.replace('text-slate-400', 'text-red-500');
            } catch (err) {
                console.error("Mic Permission Error:", err);
                showNotification('error', 'İcazə rədd edildi', 'Analiz üçün səsli daxiletmədən istifadə etmək üçün mikrofona icazə verilməlidir.');
            }
        }

        function stopListening() {
            isListening = false;
            if (recognition) recognition.stop();
            toggleVoiceBtn.classList.remove('active-voice', 'listening-glow');
            voiceIcon.classList.replace('text-red-600', 'text-slate-500');
            recordingIndicator.classList.add('hidden');
            voiceHint.textContent = "Səs yazıldı. Analiz et düyməsinə basa bilərsiniz.";
            voiceHint.classList.replace('text-red-500', 'text-green-600');
            
            setTimeout(() => {
                voiceHint.classList.replace('text-green-600', 'text-slate-400');
                voiceHint.textContent = "Səs rejimi deaktivdir. Mikrofon düyməsinə basaraq danışın.";
            }, 5000);
        }

        toggleVoiceBtn.addEventListener('click', () => {
            if (isListening) stopListening();
            else startListening();
        });

        function pcmToWav(pcmData, sampleRate) {
            const buffer = new ArrayBuffer(44 + pcmData.length * 2);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 32 + pcmData.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length * 2, true);
            let offset = 44;
            for (let i = 0; i < pcmData.length; i++, offset += 2) view.setInt16(offset, pcmData[i], true);
            return new Blob([buffer], { type: 'audio/wav' });
        }

        async function playVoiceResponse(text) {
            voiceStatus.classList.remove('hidden');
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Aydın azərbaycan dilində de: ${text}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                        }
                    })
                });

                const result = await response.json();
                const part = result.candidates[0].content.parts[0];
                const audioDataB64 = part.inlineData.data;
                const sampleRate = parseInt(part.inlineData.mimeType.split('rate=')[1]) || 24000;
                
                const binaryString = atob(audioDataB64);
                const pcmData = new Int16Array(binaryString.length / 2);
                for (let i = 0; i < pcmData.length; i++) {
                    pcmData[i] = binaryString.charCodeAt(i * 2) | (binaryString.charCodeAt(i * 2 + 1) << 8);
                }
                
                const wavBlob = pcmToWav(pcmData, sampleRate);
                const audio = new Audio(URL.createObjectURL(wavBlob));
                await audio.play();
                audio.onended = () => voiceStatus.classList.add('hidden');
            } catch (err) {
                console.error("TTS Error:", err);
                voiceStatus.classList.add('hidden');
            }
        }

        async function analyzeScam() {
            const input = userInput.value.trim();
            if (!input) return;

            analyzeBtn.disabled = true;
            loader.classList.remove('hidden');
            btnContent.classList.add('hidden');
            resultsArea.classList.add('hidden');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: input }] }],
                        systemInstruction: { parts: [{ text: "Analiz et və cavabı JSON formatında (risk_level, confidence_score, analysis_summary) qaytar." }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                lastResult = JSON.parse(data.candidates[0].content.parts[0].text);
                
                displayResults(lastResult);
                playVoiceResponse(`Analiz tamamlandı. Risk səviyyəsi ${lastResult.risk_level}. ${lastResult.analysis_summary}`);

            } catch (err) {
                console.error(err);
                showNotification('error', 'Analiz alınmadı', 'AI ilə əlaqə qurarkən xəta baş verdi.');
            } finally {
                analyzeBtn.disabled = false;
                loader.classList.add('hidden');
                btnContent.classList.remove('hidden');
            }
        }

        function displayResults(data) {
            resultsArea.classList.remove('hidden');
            document.getElementById('riskLevelText').textContent = data.risk_level;
            document.getElementById('summaryText').textContent = data.analysis_summary;
            
            const ring = document.getElementById('confidenceRing');
            const circumference = 2 * Math.PI * 50;
            ring.style.strokeDashoffset = circumference - (data.confidence_score / 100) * circumference;
            document.getElementById('confidenceText').textContent = data.confidence_score + "%";

            const card = document.getElementById('riskLevelCard');
            const icon = document.getElementById('riskIcon');
            
            if (data.risk_level === 'Yüksək') {
                card.className = "p-8 rounded-[2rem] border border-red-200 bg-red-50 text-red-700 flex flex-col items-center text-center justify-center shadow-sm";
                icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>';
            } else {
                card.className = "p-8 rounded-[2rem] border border-green-200 bg-green-50 text-green-700 flex flex-col items-center text-center justify-center shadow-sm";
                icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>';
            }
        }

        analyzeBtn.addEventListener('click', analyzeScam);
        replayVoiceBtn.addEventListener('click', () => lastResult && playVoiceResponse(lastResult.analysis_summary));
    </script>
</body>
</html>
